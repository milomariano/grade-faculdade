<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montador de Grade Horária</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- BIBLIOTECA PARA DOWNLOAD DE IMAGEM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        
        <!-- Contador de Acessos Coletivo da Faculdade -->
        <div class="text-right text-xs font-mono text-gray-500 mb-2 flex items-center justify-end gap-1.5">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            Total de acessos à plataforma: <span id="contador-global" class="font-bold text-blue-600">Carregando...</span>
        </div>

        <h1 class="text-2xl font-bold text-center mb-2 text-gray-800">Monte sua Grade Horária</h1>
        <p class="text-center text-sm text-gray-500 mb-6">Atribuição de Docentes 2-2026</p>
        
        <!-- Barra de Filtros e Botões -->
        <div class="mb-6 flex flex-col md:flex-row items-center justify-between gap-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
            <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                
                <!-- Campo de Busca por Texto com Lista de Resultados -->
                <div class="w-full sm:w-80 relative">
                    <input type="text" id="busca-materia" oninput="buscarMateriasGerais()" placeholder="Digite o nome da matéria ou código UC..." class="w-full bg-white border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <div id="resultados-busca" class="absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-xl max-h-60 overflow-y-auto hidden z-50">
                        <!-- Inserido dinamicamente via JS -->
                    </div>
                </div>
                
            </div>

            <!-- Grupo de Botões de Ação -->
            <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                <!-- Botão de Limpar Seleções -->
                <button onclick="limparTodaGrade()" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-bold text-sm px-4 py-2 rounded-lg shadow-sm transition-all flex items-center gap-2 justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    Limpar Grade
                </button>

                <!-- Botão de Download da Imagem -->
                <button onclick="baixarGradeImagem()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-4 py-2 rounded-lg shadow transition-all flex items-center gap-2 justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    Baixar Grade (Apenas preenchidas)
                </button>
            </div>
        </div>
        
        <!-- A GRADE VAI ENTRAR AQUI -->
        <div class="overflow-x-auto">
            <div id="grade-container" class="min-w-[800px] p-2 bg-white"></div>
        </div>
    </div>

    <!-- Modal para escolha de matérias -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full max-h-[85vh] flex flex-col">
            <h3 id="modal-titulo" class="text-lg font-bold mb-4 text-gray-800 shrink-0"></h3>
            <div id="lista-materias" class="space-y-2 overflow-y-auto pr-1 flex-1">
                <!-- Inserido dinamicamente -->
            </div>
            <button onclick="fecharModal()" class="mt-4 w-full bg-gray-300 text-gray-700 py-2 rounded shadow hover:bg-gray-400 shrink-0 font-medium text-sm">Cancelar</button>
        </div>
    </div>

    <script src="app.js"></script>
    <!-- Rodapé da Página -->
    <footer class="mt-12 text-center text-xs text-gray-500 border-t border-gray-200 pt-4 max-w-6xl mx-auto">
        <p class="font-medium text-gray-600">Referente ao semestre: <span class="font-semibold text-gray-800">2 de 2026</span></p>
        <p class="font-medium text-gray-600">Desenvolvido por: <span class="font-semibold text-gray-800">Milo Mariano Šparica</span></p>
        <p class="mt-1">
            Contato: 
            <a href="mailto:milo.mariano99@gmail.com" class="text-blue-500 hover:underline">milo.mariano99@gmail.com</a> 
            • 
            <a href="https://wa.me/5542998719024" target="_blank" class="text-blue-500 hover:underline">+55 42 99871 9024</a>
        </p>
        <p class="text-[10px] opacity-75 mt-2">© 2026 Plataforma de Grades Horárias. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
